<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ujala ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffb3c6 50%, #ff85a1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-heart {
            position: absolute;
            font-size: 2rem;
            opacity: 0.2;
            animation: float 6s infinite ease-in-out;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
            z-index: 2;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .sender-tag {
            font-size: 1.1rem;
            color: #ff758f;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.3rem;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        .big-heart {
            font-size: 4.5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            position: relative;
            height: 70px;
        }

        button {
            padding: 14px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            transition: .3s;
            z-index: 5;
        }

        #yesBtn:hover {
            background-color: #ff758f;
            box-shadow: 0 8px 20px rgba(255,77,109,.4);
        }

        #noBtn {
            background-color: #70777a;
            color: white;
            position: fixed;
            transition: all .25s ease;
            z-index: 10;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            animation: popUp .5s;
        }

        .modal-content h2 {
            color: #ff4d6d;
            margin-bottom: 20px;
            font-size: 2.4rem;
        }

        .modal-content p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #444;
        }

        @keyframes pulse {
            0%,100%{transform:scale(1);}
            50%{transform:scale(1.08);}
        }

        @keyframes popUp {
            from{
                transform:scale(.6);
                opacity:0;
            }
            to{
                transform:scale(1);
                opacity:1;
            }
        }

        @keyframes float {
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-20px);}
        }
    </style>
</head>

<body>

<div class="bg-heart" style="top:10%;left:10%;">💖</div>
<div class="bg-heart" style="top:20%;right:15%;animation-delay:2s;">💝</div>
<div class="bg-heart" style="bottom:15%;left:20%;animation-delay:4s;">❤️</div>
<div class="bg-heart" style="bottom:25%;right:10%;animation-delay:1s;">✨</div>

<div class="container">
    <div class="sender-tag">From: Ajay</div>

    <div class="big-heart">💝</div>

    <h1>Ujala, will you forever be mine? 💕</h1>

    <div class="btn-group">

        <button id="yesBtn" onclick="showSuccess()">
            Yes! 💍
        </button>

        <button id="noBtn"
                onmouseover="moveButton()"
                onclick="moveButton()">
            No
        </button>

    </div>
</div>

<div class="modal" id="successModal">
    <div class="modal-content">
        <div style="font-size:4rem;">🥰❤️</div>
        <h2>Thank You, Madam ji!</h2>
        <p>
            You have made me the happiest person alive.
            I promise to always cherish, care for,
            and love you with all my heart.
            Forever and always. 💞
        </p>
    </div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let angle = 0;
const radius = 100;

// Place No button initially to the right of Yes
window.onload = () => {
    moveButton(true);
};

function moveButton(first = false) {

    if (!first) {
        // Random movement around the Yes button
        angle += Math.PI / 3 + Math.random() * 0.8;
    }

    const yesRect = yesBtn.getBoundingClientRect();

    const centerX = yesRect.left + yesRect.width / 2;
    const centerY = yesRect.top + yesRect.height / 2;

    const x = centerX + radius * Math.cos(angle) - noBtn.offsetWidth / 2;
    const y = centerY + radius * Math.sin(angle) - noBtn.offsetHeight / 2;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function showSuccess() {
    document.getElementById("successModal").style.display = "flex";
}
</script>

</body>
</html>
