<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ujala ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffb3c6 50%, #ff85a1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-heart {
            position: absolute;
            font-size: 2rem;
            opacity: 0.2;
            animation: float 6s infinite ease-in-out;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
            z-index: 2;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .sender-tag {
            font-size: 1.1rem;
            color: #ff758f;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.3rem;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        .big-heart {
            font-size: 4.5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            position: relative;
            height: 60px;
            align-items: center;
        }

        button {
            padding: 14px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            transition: background-color 0.2s, box-shadow 0.2s;
            z-index: 20; /* Stays in front of the No button */
        }

        #yesBtn:hover {
            background-color: #ff758f;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
        }

        #noBtn {
            background-color: #70777a;
            color: white;
            position: absolute;
            right: 40px; 
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; /* Tucks behind the Yes button layer */
        }

        /* Success Popup Window */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-content h2 {
            color: #ff4d6d;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 1.3rem;
            color: #444;
            line-height: 1.6;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes popUp {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }
    </style>
</head>
<body>

    <div class="bg-heart" style="top: 10%; left: 10%;">💖</div>
    <div class="bg-heart" style="top: 20%; right: 15%; animation-delay: 2s;">💝</div>
    <div class="bg-heart" style="bottom: 15%; left: 20%; animation-delay: 4s;">❤️</div>
    <div class="bg-heart" style="bottom: 25%; right: 10%; animation-delay: 1s;">✨</div>

    <div class="container">
        <div class="sender-tag">From: Ajay</div>
        <div class="big-heart">💝</div>
        <h1 id="questionText">Ujala, will you forever be mine? 💕</h1>
        
        <div class="btn-group" id="btnGroup">
            <button id="yesBtn" onclick="showSuccess()">Yes! 💍</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <div style="font-size: 4rem; margin-bottom: 10px;">🥰❤️</div>
            <h2>Thank You, Ujala!</h2>
            <p>You have made me the happiest person alive. I promise to always cherish, care for, and love you with all my heart. Forever and always. 💞</p>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        
        let clickCount = 0;

        function moveButton() {
            clickCount++;

            // Statically locate the Yes button coordinates
            const yesRect = yesBtn.getBoundingClientRect();
            
            // Calculate coordinates to line up perfectly behind the Yes button
            const targetX = yesRect.left + (yesRect.width / 2) - (noBtn.offsetWidth / 2);
            const targetY = yesRect.top + (yesRect.height / 2) - (noBtn.offsetHeight / 2);

            noBtn.style.position = 'fixed';

            // Click 4: Hide 25% (Pushed downward slightly so 75% of it is visible below Yes)
            if (clickCount === 4) {
                noBtn.style.left = targetX + 'px';
                noBtn.style.top = (targetY + 22) + 'px'; 
                noBtn.style.opacity = '0.85';
                return;
            }
            
            // Click 5: Hide 75% (Tucked closely under, only a tiny edge showing)
            if (clickCount === 5) {
                noBtn.style.left = targetX + 'px';
                noBtn.style.top = (targetY + 8) + 'px'; 
                noBtn.style.opacity = '0.4';
                return;
            }

            // Click 6+: Completely hidden right behind Yes and made unclickable
            if (clickCount >= 6) {
                noBtn.style.left = targetX + 'px';
                noBtn.style.top = targetY + 'px';
                noBtn.style.opacity = '0';
                noBtn.style.pointerEvents = 'none'; 
                return;
            }

            // Default random jump bounds logic (Clicks 1, 2, 3)
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            
            // Strict boundaries so it stays completely on-screen
            const safeMargin = 20; 
            const maxX = screenWidth - btnWidth - safeMargin;
            const maxY = screenHeight - btnHeight - safeMargin;

            // Generate precise screen values within the viewport limits
            const randomX = Math.floor(Math.random() * (maxX - safeMargin)) + safeMargin;
            const randomY = Math.floor(Math.random() * (maxY - safeMargin)) + safeMargin;

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function showSuccess() {
            document.getElementById('successModal').style.display = 'flex';
        }
    </script>
</body>
</html>
